name: Kaggle Submission

on:
  push:
    branches:
      - main  # Triggers whenever you push to the main branch

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Kaggle API
        run: pip install kaggle

      - name: Submit to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # Replace [competition-name] and [file-path] with your actual data
          kaggle competitions submit -c [competition-name] -f [file-path/submission.csv] -m "Automated submission from GitHub Actions"
